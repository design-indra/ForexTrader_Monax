name: Build APK - ForexTrader Monex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Build APK via PWABuilder
        run: |
          pwa build https://forextradermifx.up.railway.app \
            --platform androidTWA \
            --output ./apk-output

      - name: Find APK
        run: |
          find apk-output -name "*.apk" | head -5
          find apk-output -name "*.zip" | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForexTrader-Monex-APK
          path: apk-output/
          retention-days: 30
