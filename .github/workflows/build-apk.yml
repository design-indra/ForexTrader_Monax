name: Build APK - ForexTrader Monex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/forextrader.keystore

      - name: Init Bubblewrap TWA
        run: |
          mkdir -p twa-build && cd twa-build
          bubblewrap init \
            --manifest https://forextradermifx.up.railway.app/manifest.json \
            --directory . \
            --skipPwaValidation

      - name: Build APK
        run: |
          cd twa-build
          bubblewrap build \
            --keystoreFile $HOME/forextrader.keystore \
            --keystorePassword "${{ secrets.KEYSTORE_PASSWORD }}" \
            --keyAlias "${{ secrets.KEY_ALIAS }}" \
            --keyPassword "${{ secrets.KEY_PASSWORD }}"

      - name: Find and copy APK
        run: |
          mkdir -p apk-output
          APK=$(find twa-build -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" apk-output/ForexTrader-Monex.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForexTrader-Monex-APK
          path: apk-output/ForexTrader-Monex.apk
          retention-days: 30

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}-${{ github.run_number }}
          name: "ForexTrader Monex v${{ steps.version.outputs.VERSION }} (Build #${{ github.run_number }})"
          body: |
            ## 📱 ForexTrader Monex APK
            **Broker:** PT Monex Investindo Futures (MIFX)
            **URL:** https://forextradermifx.up.railway.app
            **Build:** #${{ github.run_number }}
          files: apk-output/ForexTrader-Monex.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
