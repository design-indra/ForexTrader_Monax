name: Build APK - ForexTrader Monex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android TWA project
        run: |
          mkdir -p twa/app/src/main/java/com/forextrader/monex
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/gradle/wrapper

      - name: Write project files
        run: |
          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ForexTraderMonex"
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.forextrader.monex'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.forextrader.monex'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.1.0'
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="ForexTrader Monex"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://forextradermifx.up.railway.app"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/colorPrimary"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/colorPrimary"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                              android:host="forextradermifx.up.railway.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1117</color>
          </resources>
          EOF

          cat > twa/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Setup Gradle wrapper
        run: |
          cd twa
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.2/bin/gradle wrapper
          chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/forextrader.keystore

      - name: Build signed APK
        run: |
          cd twa
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/forextrader.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Copy APK
        run: |
          mkdir -p apk-output
          APK=$(find twa -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" apk-output/ForexTrader-Monex.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForexTrader-Monex-APK
          path: apk-output/ForexTrader-Monex.apk
          retention-days: 30

      - name: Get version
        id: version
        run: |
          echo "VERSION=1.1.0" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0-${{ github.run_number }}
          name: "ForexTrader Monex v1.1.0 (Build #${{ github.run_number }})"
          body: |
            ## 📱 ForexTrader Monex APK
            **Broker:** PT Monex Investindo Futures (MIFX)
            **URL:** https://forextradermifx.up.railway.app
            **Build:** #${{ github.run_number }}

            ### Cara Install:
            1. Download ForexTrader-Monex.apk
            2. Aktifkan install dari sumber tidak dikenal
            3. Install APK
          files: apk-output/ForexTrader-Monex.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
