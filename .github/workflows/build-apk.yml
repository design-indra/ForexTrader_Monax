name: Build APK - ForexTrader Monex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create TWA project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/gradle/wrapper

          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ForexTraderMonex"
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.forextrader.monex'
              compileSdkVersion 34
              defaultConfig {
                  applicationId 'com.forextrader.monex'
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName '1.1.0'
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="ForexTrader Monex" android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://forextradermifx.up.railway.app"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="#0f1117"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="forextradermifx.up.railway.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ForexTrader Monex</string>
          </resources>
          EOF

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o twa/gradlew
          chmod +x twa/gradlew
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o twa/gradle/wrapper/gradle-wrapper.jar

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/forextrader.keystore

      - name: Build Debug APK
        run: |
          cd twa
          ./gradlew assembleDebug --stacktrace

      - name: Sign APK
        run: |
          APK=$(find twa -name "*debug*.apk" | head -1)
          echo "APK: $APK"
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK" twa/aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks $HOME/forextrader.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out twa/ForexTrader-Monex.apk \
            twa/aligned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForexTrader-Monex-APK
          path: twa/ForexTrader-Monex.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0-${{ github.run_number }}
          name: "ForexTrader Monex v1.1.0 (Build #${{ github.run_number }})"
          body: |
            ## 📱 ForexTrader Monex APK
            **Broker:** PT Monex Investindo Futures (MIFX)
            **URL:** https://forextradermifx.up.railway.app
            **Build:** #${{ github.run_number }}
            ### Cara Install:
            1. Download ForexTrader-Monex.apk
            2. Aktifkan install dari sumber tidak dikenal
            3. Install APK
          files: twa/ForexTrader-Monex.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
